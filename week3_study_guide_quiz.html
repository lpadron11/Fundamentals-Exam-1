<style>
  :root {

  }

  .topbar {
    display: flex; justify-content: space-between; align-items: baseline;

  .topbar strong { color: var(--navy); }

  .sub { color: var(--muted); font-size: 13px; margin: 0 0 26px; line-height: 1.45; }

    padding: 26px 26px 22px; box-shadow: 0 1px 2px rgba(30,39,97,.04);
  }

  .qtext { font-size: 17px; line-height: 1.45; margin: 0 0 20px; color: var(--navy-deep); font-weight: 600; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    text-align: left; background: var(--ice-pale); border: 1px solid transparent;
    border-radius: 8px; padding: 13px 16px; font-size: 14.5px; font-family: var(--sans);
    color: var(--ink); cursor: pointer; transition: background .15s, border-color .15s, transform .1s;

  .choice:hover:not(:disabled) { background: var(--ice); }
  .choice:active:not(:disabled) { transform: scale(.997); }
  .choice:disabled { cursor: default; }
  .choice.correct { background: var(--good-bg); border-color: var(--good); color: var(--good); font-weight: 600; }
  .choice.incorrect { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); font-weight: 600; }
  .choice.reveal-correct { background: var(--good-bg); border-color: var(--good); color: var(--good); }

    margin-top: 18px; padding: 14px 16px; background: var(--ice-pale);
    border-left: 3px solid var(--navy); border-radius: 0 8px 8px 0;
    font-size: 13.5px; line-height: 1.55; color: var(--ink); display: none;
  }
  .explain.show { display: block; }
  .explain b { color: var(--navy); }

  .footer-row { display: flex; justify-content: flex-end; margin-top: 20px; }
  .next-btn {
    background: var(--navy); color: #fff; border: none; border-radius: 7px;
    padding: 11px 22px; font-size: 14px; font-weight: 600; font-family: var(--sans);
    cursor: pointer; opacity: 0; pointer-events: none; transition: opacity .2s, background .15s;
  }
  .next-btn.show { opacity: 1; pointer-events: auto; }
  .next-btn:hover { background: var(--navy-deep); }

  .results { text-align: center; padding: 10px 8px 4px; }
  .score-big { font-family: var(--serif); font-size: 52px; color: var(--navy); font-weight: 700; margin: 6px 0 0; }
  .score-label { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  .verdict { font-size: 15px; color: var(--ink); margin-bottom: 22px; line-height: 1.5; }

  .cat-breakdown { text-align: left; margin: 0 0 24px; padding: 0; list-style: none; }
  .cat-breakdown li {
    display: flex; justify-content: space-between; gap: 10px; padding: 9px 14px;
    background: var(--ice-pale); border-radius: 7px; margin-bottom: 6px; font-size: 12.5px;
  }
  .cat-breakdown b { color: var(--navy); white-space: nowrap; }

  .missed-list { text-align: left; margin: 0 0 26px; padding: 0; list-style: none; }
  .missed-list li {
    padding: 10px 14px; background: var(--ice-pale); border-radius: 7px;
    margin-bottom: 8px; font-size: 13px; line-height: 1.5;
  }
  .missed-list li b { color: var(--navy); }

  .restart-btn {
    background: transparent; color: var(--navy); border: 1.5px solid var(--navy);
    border-radius: 7px; padding: 10px 20px; font-size: 14px; font-weight: 600;
    font-family: var(--sans); cursor: pointer;
  }
  .restart-btn:hover { background: var(--ice-pale); }

  @media (max-width: 480px) {
    .card { padding: 20px 18px; }
    .qtext { font-size: 15.5px; }
  }
</style>

let current = 0;
let score = 0;
let answered = false;
const missed = [];
const catStats = {};

const card = document.getElementById("quizCard");
const progressText = document.getElementById("progressText");
const traceFill = document.getElementById("traceFill");
const catBar = document.getElementById("catBar");

document.getElementById("progressText").innerHTML = "<strong>1</strong> / " + QUESTIONS.length;

function renderQuestion() {
  answered = false;
  const item = QUESTIONS[current];
  progressText.innerHTML = "<strong>" + (current + 1) + "</strong> / " + QUESTIONS.length;
  catBar.textContent = item.cat;
  traceFill.style.setProperty("--reveal", (100 - ((current) / QUESTIONS.length) * 100) + "%");

  card.innerHTML = "";

  const qnum = document.createElement("div");
  qnum.className = "qnum";
  qnum.textContent = "Question " + (current + 1) + " of " + QUESTIONS.length;
  card.appendChild(qnum);

  const qtext = document.createElement("p");
  qtext.className = "qtext";
  qtext.textContent = item.q;
  card.appendChild(qtext);

  const choicesWrap = document.createElement("div");
  choicesWrap.className = "choices";

  item.choices.forEach((choiceText, idx) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choiceText;
    btn.addEventListener("click", () => handleAnswer(idx, btn, choicesWrap, item));
    choicesWrap.appendChild(btn);
  });

  card.appendChild(choicesWrap);

  const explain = document.createElement("div");
  explain.className = "explain";
  explain.id = "explainBox";
  explain.innerHTML = "<b>Why:</b> " + item.explain;
  card.appendChild(explain);

  const footerRow = document.createElement("div");
  footerRow.className = "footer-row";
  const nextBtn = document.createElement("button");
  nextBtn.className = "next-btn";
  nextBtn.id = "nextBtn";
  nextBtn.textContent = current === QUESTIONS.length - 1 ? "See results" : "Next question";
  nextBtn.addEventListener("click", goNext);
  footerRow.appendChild(nextBtn);
  card.appendChild(footerRow);
}

function handleAnswer(idx, btn, choicesWrap, item) {
  if (answered) return;
  answered = true;

  if (!catStats[item.cat]) catStats[item.cat] = { correct: 0, total: 0 };
  catStats[item.cat].total++;

  const buttons = choicesWrap.querySelectorAll(".choice");
  buttons.forEach((b) => (b.disabled = true));

  if (idx === item.correct) {
    btn.classList.add("correct");
    score++;
    catStats[item.cat].correct++;
  } else {
    btn.classList.add("incorrect");
    buttons[item.correct].classList.add("reveal-correct");
    missed.push({ q: item.q, explain: item.explain, cat: item.cat });
  }

  document.getElementById("explainBox").classList.add("show");
  document.getElementById("nextBtn").classList.add("show");
}

function goNext() {
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
  } else {
    renderResults();
  }
}

function renderResults() {
  traceFill.style.setProperty("--reveal", "0%");
  progressText.innerHTML = "<strong>Done</strong>";
  catBar.textContent = "";

  const pct = Math.round((score / QUESTIONS.length) * 100);
  let verdict;
  if (pct >= 90) verdict = "Excellent command of Week 3 across every study guide bullet — you're in strong shape for the exam on this material.";
  else if (pct >= 75) verdict = "Solid overall grasp. Check the category breakdown below and review your weakest section.";
  else if (pct >= 50) verdict = "Foundation is there, but several areas need another pass — use the category breakdown to target your remaining study time.";
  else verdict = "Worth another full pass through the study guide and lecture — this material is heavily tested.";

  card.innerHTML = "";
  const results = document.createElement("div");
  results.className = "results";

  results.innerHTML =
    '<div class="score-big">' + score + " / " + QUESTIONS.length + "</div>" +
    '<div class="score-label">' + pct + "% correct</div>" +
    '<div class="verdict">' + verdict + "</div>";

  const catList = document.createElement("ul");
  catList.className = "cat-breakdown";
  Object.keys(catStats).forEach((cat) => {
    const stat = catStats[cat];
    const li = document.createElement("li");
    li.innerHTML = "<span>" + cat + "</span><b>" + stat.correct + " / " + stat.total + "</b>";
    catList.appendChild(li);
  });
  results.appendChild(catList);

  if (missed.length > 0) {
    const list = document.createElement("ul");
    list.className = "missed-list";
    missed.forEach((m) => {
      const li = document.createElement("li");
      li.innerHTML = "<b>" + m.q + "</b><br>" + m.explain;
      list.appendChild(li);
    });
    results.appendChild(list);
  }

  const restartBtn = document.createElement("button");
  restartBtn.className = "restart-btn";
  restartBtn.textContent = "Retake quiz";
  restartBtn.addEventListener("click", () => {
    current = 0;
    score = 0;
    missed.length = 0;
    Object.keys(catStats).forEach((k) => delete catStats[k]);
    renderQuestion();
  });
  results.appendChild(restartBtn);

  card.appendChild(results);
}

renderQuestion();
</script>
