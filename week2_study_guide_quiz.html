  {

    cat: "2. PES / Nursing Diagnosis",
    q: "The 'AEB' (as evidenced by) portion of a PES statement is required for which type of diagnosis, but NOT used for the other?",

  {
    cat: "2. PES / Nursing Diagnosis",
    q: "A NANDA-I diagnosis label can be classified as Actual, Risk For, or:",

  {
    cat: "3. SMART Outcome Statements",

    explain: "Achievable means realistic given the patient's condition, resources, and timeframe — and should be set collaboratively WITH the patient, not unilaterally for them. Too easy isn't therapeutic; too hard sets the patient up to fail."
  },
  {
    cat: "3. SMART Outcome Statements",
    q: "The 'R' in SMART (Relevant) means the goal should be:",
    choices: ["Related to any convenient measure", "Directly tied to the \"P\" (Problem) in the patient's PES statement", "Reviewed only at discharge", "Written by the physician, not the nurse"],
    correct: 1,
    explain: "If the nursing diagnosis is Acute Pain, the goal should address pain specifically — not an unrelated problem. Relevance means the goal and the diagnosis are directly connected."
  },
  {
    cat: "3. SMART Outcome Statements",

    cat: "4. Types of Nursing Interventions",

    choices: ["Independent intervention", "Dependent intervention", "Collaborative/interdependent intervention", "Standing order only"],

  {
    cat: "5. Subjective vs. Objective Data",
    q: "Carmen states, \"This pain feels different from my incision pain.\" This is an example of:",
    choices: ["Objective data", "Subjective data", "A vital sign", "A lab value"],
    correct: 1,
    explain: "Subjective data is what the patient reports in their own words — feelings, sensations, and perceptions that can't be directly observed by the nurse."
  },

    q: "Diminished lung sounds heard on auscultation and a measured SpO2 of 93% are examples of:",

    q: "Both subjective and objective data are primarily gathered during which step of the nursing process?",
    choices: ["Diagnosis", "Assessment", "Planning", "Evaluation"],

let current = 0;
let score = 0;
let answered = false;
const missed = [];
const catStats = {};

const card = document.getElementById("quizCard");
const progressText = document.getElementById("progressText");
const traceFill = document.getElementById("traceFill");
const catBar = document.getElementById("catBar");

document.getElementById("progressText").innerHTML = "<strong>1</strong> / " + QUESTIONS.length;

function renderQuestion() {
  answered = false;
  const item = QUESTIONS[current];
  progressText.innerHTML = "<strong>" + (current + 1) + "</strong> / " + QUESTIONS.length;
  catBar.textContent = item.cat;
  traceFill.style.setProperty("--reveal", (100 - ((current) / QUESTIONS.length) * 100) + "%");

  card.innerHTML = "";

  const qnum = document.createElement("div");
  qnum.className = "qnum";
  qnum.textContent = "Question " + (current + 1) + " of " + QUESTIONS.length;
  card.appendChild(qnum);

  const qtext = document.createElement("p");
  qtext.className = "qtext";
  qtext.textContent = item.q;
  card.appendChild(qtext);

  const choicesWrap = document.createElement("div");
  choicesWrap.className = "choices";

  item.choices.forEach((choiceText, idx) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choiceText;
    btn.addEventListener("click", () => handleAnswer(idx, btn, choicesWrap, item));
    choicesWrap.appendChild(btn);
  });

  card.appendChild(choicesWrap);

  const explain = document.createElement("div");
  explain.className = "explain";
  explain.id = "explainBox";
  explain.innerHTML = "<b>Why:</b> " + item.explain;
  card.appendChild(explain);

  const footerRow = document.createElement("div");
  footerRow.className = "footer-row";
  const nextBtn = document.createElement("button");
  nextBtn.className = "next-btn";
  nextBtn.id = "nextBtn";
  nextBtn.textContent = current === QUESTIONS.length - 1 ? "See results" : "Next question";
  nextBtn.addEventListener("click", goNext);
  footerRow.appendChild(nextBtn);
  card.appendChild(footerRow);
}

function handleAnswer(idx, btn, choicesWrap, item) {
  if (answered) return;
  answered = true;

  if (!catStats[item.cat]) catStats[item.cat] = { correct: 0, total: 0 };
  catStats[item.cat].total++;

  const buttons = choicesWrap.querySelectorAll(".choice");
  buttons.forEach((b) => (b.disabled = true));

  if (idx === item.correct) {
    btn.classList.add("correct");
    score++;
    catStats[item.cat].correct++;
  } else {
    btn.classList.add("incorrect");
    buttons[item.correct].classList.add("reveal-correct");
    missed.push({ q: item.q, explain: item.explain, cat: item.cat });
  }

  document.getElementById("explainBox").classList.add("show");
  document.getElementById("nextBtn").classList.add("show");
}

function goNext() {
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
  } else {
    renderResults();
  }
}

function renderResults() {
  traceFill.style.setProperty("--reveal", "0%");
  progressText.innerHTML = "<strong>Done</strong>";
  catBar.textContent = "";

  const pct = Math.round((score / QUESTIONS.length) * 100);
  let verdict;
  if (pct >= 90) verdict = "Excellent command of Week 2 across every study guide bullet — you're in strong shape for the exam on this material.";
  else if (pct >= 75) verdict = "Solid overall grasp. Check the category breakdown below and review your weakest section.";
  else if (pct >= 50) verdict = "Foundation is there, but several areas need another pass — use the category breakdown to target your remaining study time.";
  else verdict = "Worth another full pass through the study guide and lecture — this material is heavily tested.";

  card.innerHTML = "";
  const results = document.createElement("div");
  results.className = "results";

  results.innerHTML =
    '<div class="score-big">' + score + " / " + QUESTIONS.length + "</div>" +
    '<div class="score-label">' + pct + "% correct</div>" +
    '<div class="verdict">' + verdict + "</div>";

  const catList = document.createElement("ul");
  catList.className = "cat-breakdown";
  Object.keys(catStats).forEach((cat) => {
    const stat = catStats[cat];
    const li = document.createElement("li");
    li.innerHTML = "<span>" + cat + "</span><b>" + stat.correct + " / " + stat.total + "</b>";
    catList.appendChild(li);
  });
  results.appendChild(catList);

  if (missed.length > 0) {
    const list = document.createElement("ul");
    list.className = "missed-list";
    missed.forEach((m) => {
      const li = document.createElement("li");
      li.innerHTML = "<b>" + m.q + "</b><br>" + m.explain;
      list.appendChild(li);
    });
    results.appendChild(list);
  }

  const restartBtn = document.createElement("button");
  restartBtn.className = "restart-btn";
  restartBtn.textContent = "Retake quiz";
  restartBtn.addEventListener("click", () => {
    current = 0;
    score = 0;
    missed.length = 0;
    Object.keys(catStats).forEach((k) => delete catStats[k]);
    renderQuestion();
  });
  results.appendChild(restartBtn);

  card.appendChild(results);
}

renderQuestion();
</script>
